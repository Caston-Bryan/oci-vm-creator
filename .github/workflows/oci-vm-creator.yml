name: OCI ARM VM Auto Creator

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=ap-osaka-1" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.VM_SSH_PUBLIC_KEY }}" > ~/.oci/vm_key.pub

      - name: Create shape config
        run: |
          echo '{"ocpus": 2, "memoryInGBs": 12}' > ~/.oci/shape_config.json

      - name: Try to create VM
        id: create_vm
        run: |
          RESULT=$(oci compute instance launch \
            --endpoint "https://iaas.ap-osaka-1.oraclecloud.com" \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "hrhi:AP-OSAKA-1-AD-1" \
            --image-id "ocid1.image.oc1.ap-osaka-1.aaaaaaaaec3dzncld2qj5eg33qnpy5jfdos6tpm6zgc6jggyzghio3lmthkq" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file://~/.oci/shape_config.json \
            --subnet-id "ocid1.subnet.oc1.ap-osaka-1.aaaaaaaaxhmoj2thfcbpdp5zbuykywyspt3pk2zurp2qvbpl72fx2nhb2iba" \
            --display-name "free-arm-vm" \
