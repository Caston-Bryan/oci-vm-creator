name: OCI ARM VM Auto Creator

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  create-vm:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=ap-osaka-1" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Setup Keys and Config
        run: |
          echo "${{ secrets.VM_SSH_PUBLIC_KEY }}" > ~/.oci/vm_key.pub
          echo '{"ocpus": 2, "memoryInGBs": 12}' > ~/.oci/shape_config.json

      - name: Try to create VM
        id: create_vm
        shell: bash
        run: |
          set +e
          oci compute instance launch \
            --endpoint "https://iaas.ap-osaka-1.oraclecloud.com" \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "hrhi:AP-OSAKA-1-AD-1" \
            --image-id "ocid1.image.oc1.ap-osaka-1.aaaaaaaaec3dzncld2qj5eg33qnpy5jfdos6tpm6zgc6jggyzghio3lmthkq" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config file://~/.oci/shape_config.json \
            --subnet-id "ocid1.subnet.oc1.ap-osaka-1.aaaaaaaaxhmoj2thfcbpdp5zbuykywyspt3pk2zurp2qvbpl72fx2nhb2iba" \
            --display-name "free-arm-vm" \
            --ssh-authorized-keys-file ~/.oci/vm_key.pub \
            --assign-public-ip true > /tmp/oci_result.json 2>&1
          RESULT=$(cat /tmp/oci_result.json)
          if echo "$RESULT" | grep -q '"lifecycle-state"'; then
            echo "STATUS=success" >> $GITHUB_OUTPUT
            echo "PUBLIC_IP=확인필요" >> $GITHUB_OUTPUT
          elif echo "$RESULT" | grep -q "LimitExceeded"; then
            echo "STATUS=limit" >> $GITHUB_OUTPUT
          else
            echo "STATUS=capacity" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord - Success
        if: steps.create_vm.outputs.STATUS == 'success'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "🎉 OCI ARM VM 생성 성공! SSH: ssh -i vm_key opc@${{ steps.create_vm.outputs.PUBLIC_IP }}"}'

      - name: Notify Discord - Limit
        if: steps.create_vm.outputs.STATUS == 'limit'
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ OCI VM 한도 초과. 콘솔 확인 필요."}'
